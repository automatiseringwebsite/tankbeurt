<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Tankbeurt App</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f5f5f5;
        }
        .section {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .success { border-color: #28a745; background: #d4edda; }
        .error { border-color: #dc3545; background: #f8d7da; }
        .info { border-color: #17a2b8; background: #d1ecf1; }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>🔍 Tankbeurt App Debug</h1>

    <div class="section info">
        <h3>📱 Browser Info</h3>
        <div id="browserInfo"></div>
    </div>

    <div class="section info">
        <h3>🌐 Network Status</h3>
        <div id="networkStatus"></div>
    </div>

    <div class="section">
        <h3>📊 API Test</h3>
        <button onclick="testAPI()">Test /api/tankbeurten</button>
        <button onclick="testDebug()">Test /api/debug</button>
        <div id="apiResult" style="margin-top: 10px;"></div>
    </div>

    <div class="section">
        <h3>💾 LocalStorage Check</h3>
        <button onclick="checkLocalStorage()">Check LocalStorage</button>
        <button onclick="clearLocalStorage()">Clear LocalStorage</button>
        <div id="localStorageResult" style="margin-top: 10px;"></div>
    </div>

    <script>
        // Browser info
        document.getElementById('browserInfo').innerHTML = `
            <p><strong>User Agent:</strong> ${navigator.userAgent}</p>
            <p><strong>Platform:</strong> ${navigator.platform}</p>
            <p><strong>Online:</strong> ${navigator.onLine}</p>
        `;

        // Network status
        function updateNetworkStatus() {
            const status = document.getElementById('networkStatus');
            status.innerHTML = `
                <p><strong>Online:</strong> ${navigator.onLine}</p>
                <p><strong>Connection Type:</strong> ${navigator.connection ? navigator.connection.effectiveType : 'Unknown'}</p>
                <p><strong>RTT:</strong> ${navigator.connection ? navigator.connection.rtt + 'ms' : 'Unknown'}</p>
            `;
        }
        updateNetworkStatus();

        // Update on network change
        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);

        // API test
        async function testAPI() {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.innerHTML = '<p>⏳ Laden...</p>';

            try {
                const response = await fetch('/api/tankbeurten');
                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="section success">
                            <h4>✅ API werkt!</h4>
                            <p><strong>Status:</strong> ${response.status}</p>
                            <p><strong>Tankbeurten:</strong> ${data.length}</p>
                            <pre style="margin-top: 10px; max-height: 200px; overflow: auto;">${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="section error">
                        <h4>❌ API Fout</h4>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Details:</strong> ${error.stack || 'No stack trace'}</p>
                    </div>
                `;
            }
        }

        // Debug endpoint test
        async function testDebug() {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.innerHTML = '<p>⏳ Laden...</p>';

            try {
                const response = await fetch('/api/debug');
                const data = await response.json();

                resultDiv.innerHTML = `
                    <div class="section success">
                        <h4>✅ Debug Info</h4>
                        <pre style="margin-top: 10px; max-height: 400px; overflow: auto;">${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="section error">
                        <h4>❌ Debug Fout</h4>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }

        // LocalStorage check
        function checkLocalStorage() {
            const resultDiv = document.getElementById('localStorageResult');

            try {
                const tankbeurten = localStorage.getItem('tankbeurt_db');

                if (tankbeurten) {
                    const parsed = JSON.parse(tankbeurten);
                    resultDiv.innerHTML = `
                        <div class="section success">
                            <h4>✅ LocalStorage gevonden</h4>
                            <p><strong>Tankbeurten:</strong> ${parsed.tankbeurten ? parsed.tankbeurten.length : 0}</p>
                            <p><strong>Statistieken:</strong> ${JSON.stringify(parsed.statistieken || {})}</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="section info">
                            <h4>ℹ️ Geen LocalStorage data</h4>
                            <p>Geen tankbeurten gevonden in localStorage.</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="section error">
                        <h4>❌ LocalStorage Fout</h4>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }

        // Clear localStorage
        function clearLocalStorage() {
            if (confirm('Weet je zeker dat je localStorage wilt legen?')) {
                localStorage.clear();
                alert('✅ LocalStorage geleegd!');
                checkLocalStorage();
            }
        }

        // Auto-test API
        testAPI();
        checkLocalStorage();
    </script>
</body>
</html>
